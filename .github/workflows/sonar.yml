name: sonar

on:
  workflow_run:
    branches:
      - main
    workflows: ['checks']
    types:
      - completed

jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - run: yarn install
    - run: rm -rf coverage && yarn vitest run --coverage
    - uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=${{ secrets.SONAR_ORG }}
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
          -Dsonar.language=ts
          -Dsonar.javascript.lcov.reportPaths=./coverage/lcov.info
          -Dsonar.sources=./src
          -Dsonar.exclusions=*.spec.ts,*.spec.tsx,*.test.ts,*.test.tsx
          -Dsotar.tests=./src
          -Dsonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx
          -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/index.ts,**/index.tsx,src/main.ts
